<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blue Test</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  body { margin: 0; }
  #map { width: 100vw; height: 60vh; }
  #log { padding: 10px; font-family: monospace; font-size: 13px; background: #111; color: #0f0; height: 40vh; overflow-y: auto; }
</style>
</head>
<body>
<div id="map"></div>
<div id="log">Waiting for GPS...<br></div>
<script>
function log(msg) {
  document.getElementById('log').innerHTML += msg + '<br>';
}

const map = L.map('map').setView([0, 0], 2);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
log('Map created');

navigator.geolocation.getCurrentPosition(function(pos) {
  const lat = pos.coords.latitude;
  const lon = pos.coords.longitude;
  const acc = pos.coords.accuracy;
  log('GPS fix: ' + lat.toFixed(4) + ', ' + lon.toFixed(4) + ' acc=' + Math.round(acc) + 'm');

  map.setView([lat, lon], 14);
  log('Map panned');

  const dot = L.circleMarker([lat, lon], {
    radius: 12,
    color: '#ffffff',
    weight: 3,
    fillColor: '#3a8fff',
    fillOpacity: 1,
  }).addTo(map);
  log('circleMarker added: ' + JSON.stringify(dot.getLatLng()));

  const box = L.rectangle([[lat-0.01, lon-0.01],[lat+0.01, lon+0.01]], {
    color: '#3a8fff', weight: 2, fillColor: '#3a8fff', fillOpacity: 0.1
  }).addTo(map);
  log('rectangle added');

}, function(err) {
  log('GPS ERROR code=' + err.code + ' msg=' + err.message);
}, {enableHighAccuracy: true, timeout: 20000});
</script>
</body>
</html>
